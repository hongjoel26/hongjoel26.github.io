<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JoelWorks</title>
<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
h1{
    font-size:70px;
}
p{
    color:#94a3b8;
    text-align:center;
}

.hero {
    text-align: center;
}

.profile-picture {
    width: 220px;
    height: 220px;
    margin: 32px auto;
    display: block;

    object-fit: cover;

    border-radius: 50%;

    border: 4px solid white;

    box-shadow: 0 10px 30px rgba(0,0,0,.35);
}
</style>
</head>
<body>
<div class="hero">
    <h1>JoelWorks</h1>

    <img
        src="profile-picture.png"
        alt="Joel Hong"
        class="profile-picture"
    />

    <p>Mechanical Design Engineer • Robotics • AI</p>
</div>
</body>
</html>
